# =============================================================================
# MPII — إعدادات النظام (News pipeline settings)
# عدّل هذا الملف بحرية ثم شغّل:  mpii news --all   (يطبّق إعداداتك)
# =============================================================================

news:
  region: IQ          # بلد الأخبار
  language: ar        # لغة الأخبار

  # --- 1) مصادر الأخبار المعتمدة -------------------------------------------
  # أضف/احذف مواقع. فارغ [] = كل المصادر. مع قائمة = هذي المواقع فقط.
  # (يحسّن الجودة ويقلّل التحيّز — تختار مصادرك بنفسك)
  sources: []
    # - almada.iq
    # - alsumaria.net
    # - ina.iq            # الوكالة الوطنية الرسمية
    # - shafaq.com
    # - alforatnews.iq

  # --- 2) كلمات/سياق تُضاف لبحث كل نائب ------------------------------------
  # تحسّن دقة المطابقة. فارغ [] = بلا إضافة (أوسع تغطية).
  extra_keywords: []
    # - "مجلس النواب"
    # - "النائب"

  # --- 3) مصطلحات/هاشتاغات/مواضيع تُرصد بشكل مستقل --------------------------
  # تظهر في تبويب "مواضيع مرصودة". أضف/احذف بحرية.
  watch_terms:
    - "فساد مجلس النواب"
    - "استجواب وزير"
    - "موازنة العراق 2026"
