name: Keep rasd-api warm

# Render's free tier sleeps after 15 min idle (cold start ~30-50s on next hit).
# Ping /health every 10 min so the monitoring backend stays awake for users.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 60 https://rasd-api.onrender.com/health) && \
              echo "ping $i → $code" && [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "warm ping did not get 200 (service may be waking)"
